<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>یادداشت‌ها</title>
  <style>
    body{
      font-family: system-ui, Tahoma, Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.9;
    }
    .date{
      color:#666;
      font-size:0.9em;
    }
  </style>
</head>
<body>

<h1>یادداشت‌ها</h1>

<ul>
{% assign essays = site.pages | where_exp:"p","p.path contains 'essays/'" | sort: "date" | reverse %}
{% for page in essays %}
  <li>
    <a href="{{ page.url }}">{{ page.title }}</a><br>
    <span class="date">
      {% include persian-date.html date=page.date %}
      — {{ page.date | date: "%A" }}
    </span>
  </li>
{% endfor %}
</ul>

</body>
</html>
